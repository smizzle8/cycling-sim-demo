<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cycling Sim Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #0e1116;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; }
  #hud {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(14, 17, 22, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 16px 20px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    gap: 28px;
    font-variant-numeric: tabular-nums;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { font-size: 10px; color: #7d8590; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 22px; font-weight: 300; }
  .stat-unit { color: #7d8590; font-size: 13px; margin-left: 3px; }
  #help {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(14, 17, 22, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 12px;
    color: #aab1ba;
    line-height: 1.6;
  }
  kbd {
    background: #30363d; color: #e6edf3;
    padding: 2px 7px; border-radius: 4px;
    font-size: 11px; font-family: ui-monospace, monospace;
    margin: 0 2px;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="hud">
  <div class="stat">
    <span class="stat-label">RPM</span>
    <span><span class="stat-value" id="rpmValue">0</span><span class="stat-unit">rpm</span></span>
  </div>
  <div class="stat">
    <span class="stat-label">Speed</span>
    <span><span class="stat-value" id="speedValue">0.0</span><span class="stat-unit">km/h</span></span>
  </div>
  <div class="stat">
    <span class="stat-label">Steering</span>
    <span class="stat-value" id="angleValue">0.00</span>
  </div>
</div>

<div id="help">
  <kbd>↑</kbd> pedal &nbsp; <kbd>←</kbd> <kbd>→</kbd> steer &nbsp; <kbd>Space</kbd> brake
</div>

<script>
const state = {
  rpm: 0,
  angle: 0,
  speed: 0,           // m/s
  worldX: 0,          // total distance traveled, drives world scroll
  wheelRotation: 0,   // radians
  crankRotation: 0,   // radians
  keys: { up: false, left: false, right: false, space: false }
};

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.clientWidth * dpr;
  canvas.height = canvas.clientHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ─── World (parallax background, road, sky) ──────────────────────
function drawWorld(w, h) {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, h * 0.7);
  skyGrad.addColorStop(0, '#0e1116');
  skyGrad.addColorStop(1, '#1f2a3a');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, w, h * 0.7);

  // Distant mountains (slow parallax)
  ctx.fillStyle = '#1a2433';
  const mountainScroll = -state.worldX * 0.05;
  ctx.beginPath();
  ctx.moveTo(0, h * 0.7);
  for (let i = -2; i < Math.ceil(w / 200) + 2; i++) {
    const baseX = (i * 200 + (mountainScroll % 200));
    ctx.lineTo(baseX, h * 0.7);
    ctx.lineTo(baseX + 100, h * 0.45 + Math.sin(i * 1.7) * 30);
    ctx.lineTo(baseX + 200, h * 0.7);
  }
  ctx.lineTo(w, h * 0.7);
  ctx.closePath();
  ctx.fill();

  // Closer hills (medium parallax)
  ctx.fillStyle = '#243042';
  const hillScroll = -state.worldX * 0.15;
  ctx.beginPath();
  ctx.moveTo(0, h * 0.72);
  for (let i = -2; i < Math.ceil(w / 140) + 2; i++) {
    const baseX = (i * 140 + (hillScroll % 140));
    ctx.lineTo(baseX, h * 0.72);
    ctx.quadraticCurveTo(baseX + 70, h * 0.55 + Math.cos(i * 0.9) * 20, baseX + 140, h * 0.72);
  }
  ctx.lineTo(w, h * 0.72);
  ctx.closePath();
  ctx.fill();

  // Ground
  ctx.fillStyle = '#1c2128';
  ctx.fillRect(0, h * 0.7, w, h * 0.3);

  // Road surface
  const roadTop = h * 0.78;
  ctx.fillStyle = '#2a3038';
  ctx.fillRect(0, roadTop, w, h - roadTop);

  // Road dashed center line — scrolls with worldX
  ctx.strokeStyle = '#f0d050';
  ctx.lineWidth = 4;
  ctx.setLineDash([40, 30]);
  ctx.lineDashOffset = state.worldX % 70;
  ctx.beginPath();
  ctx.moveTo(0, roadTop + (h - roadTop) * 0.55);
  ctx.lineTo(w, roadTop + (h - roadTop) * 0.55);
  ctx.stroke();
  ctx.setLineDash([]);

  // Roadside stripes
  ctx.strokeStyle = '#3a4250';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, roadTop + 8);
  ctx.lineTo(w, roadTop + 8);
  ctx.stroke();

  // Trees / posts (close parallax) — quick variety
  const postScroll = -state.worldX * 0.6;
  for (let i = -2; i < Math.ceil(w / 180) + 2; i++) {
    const baseX = (i * 180 + (postScroll % 180));
    drawTree(baseX, roadTop, 0.9 + (i % 3) * 0.2);
  }
}

function drawTree(x, groundY, scale) {
  ctx.save();
  ctx.translate(x, groundY);
  ctx.scale(scale, scale);

  // trunk
  ctx.fillStyle = '#3a2c20';
  ctx.fillRect(-3, -50, 6, 50);
  // foliage
  ctx.fillStyle = '#3a5a3a';
  ctx.beginPath();
  ctx.arc(0, -60, 18, 0, Math.PI * 2);
  ctx.arc(-12, -50, 14, 0, Math.PI * 2);
  ctx.arc(12, -50, 14, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ─── Bike (side view, wheels spin, crank rotates) ────────────────
function drawBike(w, h) {
  const cx = w * 0.5;
  const cy = h * 0.78 + (h - h * 0.78) * 0.55;  // sit on road center line

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(1.1, 1.1);

  // tilt slightly with steering
  ctx.rotate(state.angle * 0.06);

  // Drop shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.ellipse(0, 36, 75, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // ── Wheels ──
  drawWheel(-55, 0, 32, state.wheelRotation);  // rear
  drawWheel(55, 0, 32, state.wheelRotation);   // front

  // ── Frame (triangular) ──
  ctx.strokeStyle = '#4cc9f0';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  // bottom tube
  ctx.beginPath();
  ctx.moveTo(-55, 0);
  ctx.lineTo(0, 0);
  ctx.stroke();
  // seat tube
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-25, -42);
  ctx.stroke();
  // top tube
  ctx.beginPath();
  ctx.moveTo(-25, -42);
  ctx.lineTo(35, -42);
  ctx.stroke();
  // down tube + head tube
  ctx.beginPath();
  ctx.moveTo(35, -42);
  ctx.lineTo(0, 0);
  ctx.stroke();

  // ── Handlebar stem ──
  ctx.strokeStyle = '#4cc9f0';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(35, -42);
  ctx.lineTo(48, -58);
  ctx.stroke();
  // handlebar (rotates by steering angle perpendicular to view)
  ctx.save();
  ctx.translate(48, -58);
  // simulate yaw by squashing horizontally based on angle
  ctx.scale(1 - Math.abs(state.angle) * 0.5, 1);
  ctx.fillStyle = '#f4a261';
  ctx.beginPath();
  ctx.roundRect(-12, -3, 24, 6, 3);
  ctx.fill();
  // grip
  ctx.fillStyle = '#0e1116';
  ctx.beginPath();
  ctx.roundRect(-14, -4, 4, 8, 2);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(10, -4, 4, 8, 2);
  ctx.fill();
  ctx.restore();
  // front fork
  ctx.strokeStyle = '#4cc9f0';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(48, -58);
  ctx.lineTo(55, 0);
  ctx.stroke();

  // ── Saddle ──
  ctx.fillStyle = '#1a1f27';
  ctx.beginPath();
  ctx.roundRect(-38, -50, 26, 8, 4);
  ctx.fill();
  // seat post
  ctx.strokeStyle = '#4cc9f0';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-25, -42);
  ctx.lineTo(-25, -50);
  ctx.stroke();

  // ── Crank + pedals (rotate at half wheel speed for realism) ──
  ctx.save();
  ctx.translate(0, 0);
  ctx.rotate(state.crankRotation);
  // crank arms
  ctx.fillStyle = '#222';
  ctx.fillRect(-2, -16, 4, 32);
  // pedal at top
  ctx.fillStyle = '#f4a261';
  ctx.fillRect(-8, -20, 16, 5);
  // pedal at bottom
  ctx.fillRect(-8, 15, 16, 5);
  // chainring
  ctx.fillStyle = '#444';
  ctx.beginPath();
  ctx.arc(0, 0, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(0, 0, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // ── Chain (simplified: line from chainring to rear wheel hub) ──
  ctx.strokeStyle = '#5a5a5a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-10, 0);
  ctx.lineTo(-50, 0);
  ctx.stroke();

  ctx.restore();
}

function drawWheel(x, y, radius, rotation) {
  ctx.save();
  ctx.translate(x, y);
  // tire
  ctx.fillStyle = '#0e1116';
  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, Math.PI * 2);
  ctx.fill();
  // rim
  ctx.strokeStyle = '#3a4250';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, radius - 5, 0, Math.PI * 2);
  ctx.stroke();
  // spokes (rotate with wheel)
  ctx.save();
  ctx.rotate(rotation);
  ctx.strokeStyle = '#9aa3ad';
  ctx.lineWidth = 1.2;
  for (let i = 0; i < 6; i++) {
    ctx.save();
    ctx.rotate((Math.PI * 2 / 6) * i);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -(radius - 5));
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
  // hub
  ctx.fillStyle = '#444';
  ctx.beginPath();
  ctx.arc(0, 0, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    this.beginPath();
    this.moveTo(x + r[0], y);
    this.arcTo(x + w, y, x + w, y + h, r[1]);
    this.arcTo(x + w, y + h, x, y + h, r[2]);
    this.arcTo(x, y + h, x, y, r[3]);
    this.arcTo(x, y, x + w, y, r[0]);
    this.closePath();
  };
}

// ─── Loop ────────────────────────────────────────────────────────
const rpmValue = document.getElementById('rpmValue');
const speedValue = document.getElementById('speedValue');
const angleValue = document.getElementById('angleValue');

let lastFrame = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastFrame) / 1000);
  lastFrame = now;

  // Pedal input
  if (state.keys.up) {
    state.rpm = Math.min(140, state.rpm + 80 * dt);
  } else if (state.keys.space) {
    state.rpm = Math.max(0, state.rpm - 200 * dt);
  } else {
    state.rpm = Math.max(0, state.rpm - 30 * dt);
  }

  // Steering smoothing
  let targetAngle = 0;
  if (state.keys.left)  targetAngle -= 1;
  if (state.keys.right) targetAngle += 1;
  state.angle += (targetAngle - state.angle) * Math.min(1, dt * 5);

  // RPM → speed
  const targetSpeedMs = (state.rpm / 60) * 3;
  state.speed += (targetSpeedMs - state.speed) * Math.min(1, dt * 2);
  if (state.speed < 0.01) state.speed = 0;

  // Mechanical animation: wheels spin proportional to speed,
  // crank rotates at RPM (so pedals visibly turn at pedal rate).
  state.wheelRotation += state.speed * 0.4 * dt;       // wheel angular speed
  state.crankRotation += (state.rpm / 60) * Math.PI * 2 * dt;  // 1 rev per 60/rpm seconds

  // Move world (drives parallax scroll)
  state.worldX += state.speed * 30 * dt;

  // Draw
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  drawWorld(w, h);
  drawBike(w, h);

  rpmValue.textContent = Math.round(state.rpm);
  speedValue.textContent = (state.speed * 3.6).toFixed(1);
  angleValue.textContent = state.angle.toFixed(2);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Keyboard input always live
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp')    { state.keys.up = true; e.preventDefault(); }
  if (e.key === 'ArrowLeft')  { state.keys.left = true; e.preventDefault(); }
  if (e.key === 'ArrowRight') { state.keys.right = true; e.preventDefault(); }
  if (e.key === ' ')          { state.keys.space = true; e.preventDefault(); }
});
window.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowUp')    state.keys.up = false;
  if (e.key === 'ArrowLeft')  state.keys.left = false;
  if (e.key === 'ArrowRight') state.keys.right = false;
  if (e.key === ' ')          state.keys.space = false;
});
</script>
</body>
</html>
